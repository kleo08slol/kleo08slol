name: Metrics

on:
  # schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    environment: 
      name: production

    permissions:
      contents: write

    steps:

      - name: General
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/general.*
          config_timezone: Europe/Rome
          base: metadata

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/languages.*
          config_timezone: Europe/Rome
          base: metadata

          plugin_languages: true
          plugin_languages_other: true
      
      - name: Social
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/social.*
          config_timezone: Europe/Rome
          base: metadata

          plugin_people: true
          plugin_people_types: thanks, followers
          plugin_people_thanks: dddevid
          plugin_sponsors: true
          plugin_sponsors_sections: goal, list

      - name: Featured
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/featured.*
          config_timezone: Europe/Rome
          base: metadata
          
          plugin_repositories: true
          plugin_repositories_featured: spotifinity
      
      - name: WakaTime
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/wakatime.*
          config_timezone: Europe/Rome
          base: metadata
          
          plugin_wakatime: true
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_languages_other: true